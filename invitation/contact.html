    <div class="music">
        <audio src="../assets/mp3/song.mp3" id="my_audio" loop="loop" preload="auto"></audio>
        <button onclick="startMusic()" style="position: fixed; bottom: 20px; right: 20px; background: rgba(226, 92, 103, 0.8); color: white; border: none; border-radius: 50px; padding: 15px 25px; font-size: 1.1em; cursor: pointer; z-index: 1000; transition: all 0.3s ease;">

    <script src="../js/continuous-audio.js"></script>
    
    <script>
        // Variable to track if music should play
        let musicStarted = false;
        
        // Function to start music on user click
        function startMusic() {
            if (!musicStarted) {
                const audio = document.getElementById('my_audio');
                const playButton = document.querySelector('button[onclick="startMusic()"]');
                
                // Start the audio
                audio.play().then(() => {
                    musicStarted = true;
                    // Hide the play button
                    playButton.style.display = 'none';
                    // Start continuous audio system
                    if (typeof startContinuousAudio === 'function') {
                        startContinuousAudio();
                    }
                }).catch(error => {
                    console.log('Audio play failed:', error);
                });
            }
        }
        
        // Function to stop music and redirect
        function stopMusicAndRedirect() {
            // Stop the music
            const audio = document.getElementById('my_audio');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
            
            // Clear any continuous audio
            if (typeof stopContinuousAudio === 'function') {
                stopContinuousAudio();
            }
            
            // Redirect to home page
            window.location.href = '../index.html';
        }
        
        // Function to close Praveen container
        function closePraveenContainer() {
            const praveenContainer = document.getElementById('praveenContainer');
            praveenContainer.style.opacity = '0';
            setTimeout(() => {
                praveenContainer.style.display = 'none';
            }, 500);
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Prevent continuous audio from auto-starting
            musicStarted = false;
            
            // Show Praveen container after a short delay
            setTimeout(() => {
                const praveenContainer = document.getElementById('praveenContainer');
                praveenContainer.style.display = 'flex';
                praveenContainer.style.opacity = '0';
                
                setTimeout(() => {
                    praveenContainer.style.transition = 'opacity 0.5s ease';
                    praveenContainer.style.opacity = '1';
                }, 100);
                
                // After 7 seconds, stop music and redirect to home
                setTimeout(() => {
                    stopMusicAndRedirect();
                }, 5000);
            }, 1000);
        });
    </script>
